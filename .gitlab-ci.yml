stages:
  - validate
  - test

variables:
  VENV_PATH: ".venv"

validate-django-settings:
  stage: validate
  before_sctipt:
    - python3 -m venv $VENV_PATH
    - source $VENV_PATH/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - echo "Проверка настроек Django"
    - python3 manage.py check
    - echo "Настройки валидны"

validate-migrations:
  stage: validate
  before_script:
    - python3 -m venv $VENV_PATH
    - source $VENV_PATH/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - echo "Проверка миграций Django"
    - python3 manage.py makemigrations --check --dry-run
    - echo "Миграции валидны"

test-staticfiles:
  stage: test
  before_script:
    - python3 -m venv $VENV_PATH
    - source $VENV_PATH/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - echo "Проверка статис-файлов Django"
    - python3 manage.py collectstatic --noinput --dry-run
    - echo "Статик-файлы валидны"